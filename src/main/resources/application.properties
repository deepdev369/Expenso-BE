spring.application.name=expenso
spring.datasource.url=jdbc:postgresql://localhost:5432/expenso
spring.datasource.username=expenso_user
spring.datasource.password=secure_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Error Handling
server.error.include-message=always
error.handling.exception-logging=MESSAGE_ONLY
error.handling.full-stacktrace-http-statuses=500
error.handling.log-level=ERROR

# Error Codes
error.handling.codes.NotFoundException=NOT_FOUND
error.handling.codes.ResourceAlreadyExistsException=CONFLICT
error.handling.codes.BusinessException=BAD_REQUEST

# Logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [Correlation-ID: %X{Correlation-ID}] - %msg%n

# Security - OAuth2 & JWT
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/userinfo.profile,https://www.googleapis.com/auth/userinfo.email

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Pagination
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=50
